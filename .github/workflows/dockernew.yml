name: New Docker Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Login to Docker hub
        run: echo "${{ secrets.Docker_Password }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.docker_username}}/newdevops .

      - name: push to docker image to dockerhub
        run:  docker push ${{ secrets.docker_username}}/newdevops

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.docker_username}}/newdevops
